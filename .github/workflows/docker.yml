name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build (for example v0.2.1)
        required: true
        type: string

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/hope-agent
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  # Build per-arch images on native runners. QEMU emulation of arm64
  # would take ~6-10x longer for the Rust compile, so we use the same
  # `ubuntu-24.04-arm` runner that release.yml already relies on.
  build:
    name: build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      # Checkout the exact tag from RELEASE_TAG. For `push` events the
      # default checkout already lands on the tag commit, but
      # `workflow_dispatch` with an `inputs.tag` input would otherwise
      # build whichever branch was selected in the Actions UI — pinning
      # the ref keeps a manual re-run of `v0.2.1` faithful to that tag
      # instead of silently shipping main as `:v0.2.1`.
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      # Refuse to ship if the checked-out source's version doesn't match
      # the tag we're about to publish. Catches an admin firing
      # workflow_dispatch with a tag that points at code where someone
      # forgot to bump versions.
      - name: Verify versions match RELEASE_TAG
        run: |
          set -eu
          EXPECTED="${RELEASE_TAG#v}"
          PKG=$(grep -m1 '"version"' package.json | sed -E 's/.*"version" *: *"([^"]+)".*/\1/')
          HA_SERVER=$(grep -m1 '^version' crates/ha-server/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          if [ "$PKG" != "$EXPECTED" ] || [ "$HA_SERVER" != "$EXPECTED" ]; then
              echo "::error::tag ${RELEASE_TAG} expects version ${EXPECTED}, but found package.json=${PKG}, ha-server=${HA_SERVER}" >&2
              exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          # Push by digest into the registry — the per-arch images are
          # not tagged yet; the merge job below assembles them under the
          # human-readable tags via `imagetools create`.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: docker-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine per-arch digests into a single multi-arch manifest under the
  # human-readable tags. This is the only job that publishes the
  # `:latest` / `:vX.Y.Z` / `:X.Y` tags; mid-build crashes never leave a
  # partial multi-arch tag pointing at one arch only.
  merge:
    name: merge multi-arch manifest
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the tag list. Pre-release tags (anything with a hyphen
      # like v0.2.1-rc1 / -beta1) get the immutable vX.Y.Z tag only —
      # never the floating `:latest` or `:X.Y` tags, so a release
      # candidate can't accidentally become the default.
      - name: Derive image tags
        id: tags
        run: |
          set -eu
          TAG="${RELEASE_TAG}"
          # Strip leading `v` for semver tags.
          VERSION="${TAG#v}"
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          TAGS="-t ${IMAGE}:${TAG}"
          if [ "${VERSION}" = "${TAG}" ]; then
              echo "RELEASE_TAG '${TAG}' is not vX.Y.Z — only the immutable tag will be pushed."
          else
              case "${VERSION}" in
                  *-*)
                      echo "Pre-release detected — skipping floating tags."
                      ;;
                  *)
                      MINOR="${VERSION%.*}"
                      TAGS="${TAGS} -t ${IMAGE}:${VERSION} -t ${IMAGE}:${MINOR} -t ${IMAGE}:latest"
                      ;;
              esac
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          set -eu
          # shellcheck disable=SC2046
          docker buildx imagetools create \
              ${{ steps.tags.outputs.tags }} \
              $(printf "${REGISTRY}/${IMAGE_NAME}@sha256:%s " *)

      - name: Inspect resulting manifest
        run: |
          docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:${RELEASE_TAG}"
