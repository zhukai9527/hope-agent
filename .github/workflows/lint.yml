name: Lint

on:
  pull_request:
    branches: [main, "release/**"]
  push:
    branches: [main, "release/**"]

jobs:
  frontend:
    name: Frontend lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: Vitest
        run: pnpm test

      # Informational only for now: the repo carries ~3.3k historical missing
      # keys across the 10 non-baseline locales (en/zh are the source of truth).
      # Once that backlog is paid down, drop `continue-on-error` to make this
      # job block PRs that introduce new missing keys.
      - name: i18n missing-key check (informational)
        run: pnpm i18n:check
        continue-on-error: true
