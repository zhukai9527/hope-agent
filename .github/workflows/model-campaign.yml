name: Live Model Campaign

on:
  schedule:
    - cron: "23 2 * * *"
    - cron: "41 3 * * 1"
  workflow_dispatch:
    inputs:
      target_ref:
        description: Exact commit SHA, branch, or tag to evaluate
        required: true
        type: string
        default: main
      tier:
        description: Real-model campaign tier
        required: true
        type: choice
        options: [nightly, weekly, release, monthly]
        default: nightly
      waiver_reason:
        description: Optional one-shot release waiver reason
        required: false
        type: string
      waiver_suites:
        description: Comma-separated failed suite IDs covered by the waiver
        required: false
        type: string
      waiver_tag:
        description: Exact release tag covered by the waiver
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: live-model-campaign-${{ github.event_name == 'schedule' && github.event.schedule || inputs.target_ref }}-${{ github.event_name == 'schedule' && github.event.schedule || inputs.tier }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare immutable model campaign
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      sha: ${{ steps.meta.outputs.sha }}
      tier: ${{ steps.meta.outputs.tier }}
      retention: ${{ steps.meta.outputs.retention }}
      max_parallel: ${{ steps.meta.outputs.max_parallel }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'schedule' && 'main' || inputs.target_ref }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Resolve exact SHA and tier
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          sha=$(git rev-parse HEAD)
          tier="${{ inputs.tier }}"
          if [ "${{ github.event_name }}" = schedule ]; then
            tier=nightly
            if [ "${{ github.event.schedule }}" = "41 3 * * 1" ]; then tier=weekly; fi
          fi
          retention=$(jq -r '.artifactRetentionDays' "evals/live/policy/$tier.json")
          campaign_concurrency=$(jq -r '.campaignBudget.maxConcurrency' "evals/live/policy/$tier.json")
          trial_concurrency=$(jq -r '.budget.maxConcurrency' "evals/live/policy/$tier.json")
          max_parallel=$((campaign_concurrency / trial_concurrency))
          if [ "$max_parallel" -lt 1 ]; then max_parallel=1; fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "tier=$tier" >> "$GITHUB_OUTPUT"
          echo "retention=$retention" >> "$GITHUB_OUTPUT"
          echo "max_parallel=$max_parallel" >> "$GITHUB_OUTPUT"

      - name: Build and validate model campaign control plane
        run: |
          cargo build -p ha-eval --locked
          target/debug/hope-agent-eval model validate

      - name: Create immutable plan and shard matrix
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/model-plan"
          matrix=$(target/debug/hope-agent-eval model plan \
            --tier "${{ steps.meta.outputs.tier }}" \
            --ref "${{ steps.meta.outputs.sha }}" \
            --output "$RUNNER_TEMP/model-plan/plan.json" \
            --format github)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: model-plan-${{ steps.meta.outputs.sha }}
          path: ${{ runner.temp }}/model-plan/plan.json
          retention-days: ${{ fromJSON(steps.meta.outputs.retention) }}

  run:
    name: ${{ matrix.suite }} (${{ matrix.shard }})
    needs: prepare
    # This fleet is administered separately: disposable Linux workers,
    # provider-only egress, no personal accounts, and no retained user data.
    runs-on: [self-hosted, linux, x64, model-eval]
    environment: model-eval
    timeout-minutes: 150
    strategy:
      fail-fast: false
      # Each trial may use up to policy.budget.maxConcurrency model/tool
      # workers. Cap concurrent shard jobs so their declared worst-case sum
      # never exceeds campaignBudget.maxConcurrency.
      max-parallel: ${{ fromJSON(needs.prepare.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - uses: actions/download-artifact@v4
        with:
          name: model-plan-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/model-plan

      - name: Build Hope server and model runner
        run: cargo build -p ha-server -p ha-eval --locked

      - name: Provision isolated evaluation profile
        shell: bash
        env:
          MODEL_EVAL_CONFIG_B64: ${{ secrets.MODEL_EVAL_CONFIG_B64 }}
        run: |
          set -euo pipefail
          test -n "$MODEL_EVAL_CONFIG_B64"
          eval_data="$RUNNER_TEMP/hope-model-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.shardIndex }}"
          mkdir -p "$eval_data"
          printf '%s' "$MODEL_EVAL_CONFIG_B64" | base64 --decode > "$eval_data/config.json"
          chmod 700 "$eval_data"
          chmod 600 "$eval_data/config.json"
          jq -e '[.providers[] | select(.enabled == true)] | length == 1 and .[0].id == "eval-anchor"' "$eval_data/config.json" >/dev/null
          jq -e '.activeModel.providerId == "eval-anchor" and .activeModel.modelId == "configured-anchor-v1"' "$eval_data/config.json" >/dev/null
          jq -e 'all(.providers[]; ((.apiKey // "") == "") and (((.authProfiles // []) | length) == 0))' "$eval_data/config.json" >/dev/null
          jq -e '((.server.apiKey // "") == "") and ((.server.knowledgeAgentReadToken // "") == "")' "$eval_data/config.json" >/dev/null
          echo "HA_DATA_DIR=$eval_data" >> "$GITHUB_ENV"
          echo "HA_MODEL_EVAL_RUNTIME_CONFIG_DIGEST=$(sha256sum "$eval_data/config.json" | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Start isolated Hope server supervisor
        shell: bash
        env:
          HA_MODEL_EVAL_MODE: "1"
          HA_SERVER_AUTO_APPROVE_TOOLS: "1"
          HA_MODEL_EVAL_SERVER_TOKEN: ${{ secrets.MODEL_EVAL_SERVER_TOKEN }}
          HA_MODEL_EVAL_SUPERVISOR_TOKEN: ${{ secrets.MODEL_EVAL_SERVER_TOKEN }}
          HA_MODEL_EVAL_PROVIDER_SECRETS_B64: ${{ secrets.MODEL_EVAL_PROVIDER_SECRETS_B64 }}
        run: |
          set -euo pipefail
          test -n "$HA_MODEL_EVAL_SERVER_TOKEN"
          test -n "$HA_MODEL_EVAL_PROVIDER_SECRETS_B64"
          port=$((18420 + ${{ matrix.shardIndex }}))
          supervisor_port=$((19420 + ${{ matrix.shardIndex }}))
          server_url="http://127.0.0.1:$port"
          supervisor_url="http://127.0.0.1:$supervisor_port"
          target/debug/hope-agent-eval model _supervise-server \
            --server-bin "$GITHUB_WORKSPACE/target/debug/hope-agent-server" \
            --bind "127.0.0.1:$port" \
            --control-bind "127.0.0.1:$supervisor_port" \
            > "$RUNNER_TEMP/hope-model-server-${{ matrix.shardIndex }}.log" 2>&1 &
          supervisor_pid=$!
          echo "HA_MODEL_EVAL_SUPERVISOR_PID=$supervisor_pid" >> "$GITHUB_ENV"
          echo "HA_MODEL_EVAL_SERVER_URL=$server_url" >> "$GITHUB_ENV"
          echo "HA_MODEL_EVAL_SUPERVISOR_URL=$supervisor_url" >> "$GITHUB_ENV"
          for attempt in $(seq 1 60); do
            if curl --fail --silent "$server_url/api/health" >/dev/null; then exit 0; fi
            sleep 1
          done
          echo "Hope evaluation server did not become healthy" >&2
          exit 1

      - name: Run real-model trials
        shell: bash
        env:
          HA_MODEL_EVAL_CONFIRM_COSTS: "1"
          HA_MODEL_EVAL_NETWORK_POLICY: ${{ matrix.networkPolicy }}
          # The runner image/firewall is the enforcement boundary. This
          # attestation is checked by the binary and is not a substitute for it.
          HA_MODEL_EVAL_NETWORK_ENFORCED: "1"
          HA_MODEL_EVAL_SERVER_TOKEN: ${{ secrets.MODEL_EVAL_SERVER_TOKEN }}
          HA_MODEL_EVAL_SUPERVISOR_TOKEN: ${{ secrets.MODEL_EVAL_SERVER_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/model-result"
          target/debug/hope-agent-eval model run \
            --plan "$RUNNER_TEMP/model-plan/plan.json" \
            --suite "${{ matrix.suite }}" \
            --shard "${{ matrix.shard }}" \
            --output "$RUNNER_TEMP/model-result/result.json" \
            --confirm-model-costs

      - name: Stop server and remove isolated state
        if: always()
        shell: bash
        env:
          HA_MODEL_EVAL_SUPERVISOR_TOKEN: ${{ secrets.MODEL_EVAL_SERVER_TOKEN }}
        run: |
          if [ -n "${HA_MODEL_EVAL_SUPERVISOR_URL:-}" ] && [ -n "${HA_MODEL_EVAL_SUPERVISOR_TOKEN:-}" ]; then
            curl --fail --silent --request POST \
              --header "Authorization: Bearer $HA_MODEL_EVAL_SUPERVISOR_TOKEN" \
              "$HA_MODEL_EVAL_SUPERVISOR_URL/shutdown" >/dev/null 2>&1 || true
          fi
          if [ -n "${HA_MODEL_EVAL_SUPERVISOR_PID:-}" ]; then
            kill "$HA_MODEL_EVAL_SUPERVISOR_PID" 2>/dev/null || true
            wait "$HA_MODEL_EVAL_SUPERVISOR_PID" 2>/dev/null || true
          fi
          if [ -n "${HA_DATA_DIR:-}" ] && [ -d "$HA_DATA_DIR" ]; then
            find "$HA_DATA_DIR" -type f -exec shred -u {} + 2>/dev/null || true
            rmdir "$HA_DATA_DIR" 2>/dev/null || true
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: model-shard-${{ matrix.suite }}-${{ matrix.shardIndex }}
          path: ${{ runner.temp }}/model-result/
          if-no-files-found: warn
          retention-days: ${{ fromJSON(needs.prepare.outputs.retention) }}

  waiver:
    name: approve one-shot model campaign waiver
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.waiver_reason != '' }}
    needs: prepare
    runs-on: ubuntu-latest
    environment: release-model-eval-waiver
    steps:
      - name: Validate and record approved waiver
        shell: bash
        env:
          WAIVER_REASON: ${{ inputs.waiver_reason }}
          WAIVER_SUITES: ${{ inputs.waiver_suites }}
          WAIVER_TAG: ${{ inputs.waiver_tag }}
        run: |
          set -euo pipefail
          test "${{ needs.prepare.outputs.tier }}" = release
          test -n "$WAIVER_TAG"
          test -n "$WAIVER_SUITES"
          test "${#WAIVER_REASON}" -ge 12
          mkdir -p "$RUNNER_TEMP/model-waiver"
          suites=$(printf '%s' "$WAIVER_SUITES" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          jq -n \
            --arg commitSha "${{ needs.prepare.outputs.sha }}" \
            --arg tag "$WAIVER_TAG" \
            --arg reason "$WAIVER_REASON" \
            --arg approvedBy "${{ github.actor }}" \
            --arg approvedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg workflowRunId "${{ github.run_id }}" \
            --argjson suites "$suites" \
            '{schemaVersion:"model-campaign-waiver.v1",commitSha:$commitSha,tag:$tag,reason:$reason,suites:$suites,cases:[],modelRoles:[],approvedBy:$approvedBy,approvedAt:$approvedAt,workflowRunId:$workflowRunId}' \
            > "$RUNNER_TEMP/model-waiver/waiver.json"

      - uses: actions/upload-artifact@v4
        with:
          name: model-waiver-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/model-waiver/waiver.json
          retention-days: 90

  aggregate:
    name: aggregate and verify model evidence
    needs: [prepare, run, waiver]
    if: ${{ always() && needs.prepare.result == 'success' && (needs.run.result == 'success' || needs.run.result == 'failure') && (needs.waiver.result == 'success' || needs.waiver.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - uses: actions/download-artifact@v4
        with:
          name: model-plan-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/model-plan

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: model-shard-*
          path: ${{ runner.temp }}/model-shards

      - name: Download approved waiver when present
        if: ${{ needs.waiver.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: model-waiver-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/model-waiver

      - name: Build model campaign verifier
        run: cargo build -p ha-eval --locked

      - name: Aggregate evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/model-evidence" "$RUNNER_TEMP/model-shards"
          waiver_args=()
          if [ -f "$RUNNER_TEMP/model-waiver/waiver.json" ]; then
            waiver_args=(--waiver "$RUNNER_TEMP/model-waiver/waiver.json")
          fi
          target/debug/hope-agent-eval model aggregate \
            --plan "$RUNNER_TEMP/model-plan/plan.json" \
            --inputs "$RUNNER_TEMP/model-shards" \
            --output "$RUNNER_TEMP/model-evidence/eval-model-campaign.v1.json" \
            --summary "$RUNNER_TEMP/model-evidence/model-summary.md" \
            "${waiver_args[@]}"

      - name: Verify evidence against exact SHA and policy
        shell: bash
        env:
          WAIVER_TAG: ${{ inputs.waiver_tag }}
        run: |
          set -euo pipefail
          tag_args=()
          if [ -n "$WAIVER_TAG" ]; then tag_args=(--tag "$WAIVER_TAG"); fi
          target/debug/hope-agent-eval model verify-evidence \
            --evidence "$RUNNER_TEMP/model-evidence/eval-model-campaign.v1.json" \
            --ref "${{ needs.prepare.outputs.sha }}" \
            --tier "${{ needs.prepare.outputs.tier }}" \
            "${tag_args[@]}"

      - name: Add model result to workflow summary
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/model-evidence/model-summary.md" ]; then
            cat "$RUNNER_TEMP/model-evidence/model-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ needs.prepare.outputs.tier }}-model-evidence-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/model-evidence/
          retention-days: ${{ fromJSON(needs.prepare.outputs.retention) }}
