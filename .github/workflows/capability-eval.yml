name: Capability Evals

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      target_ref:
        description: Exact commit SHA, branch, or tag to evaluate
        required: true
        type: string
        default: main
      tier:
        description: Evaluation policy tier
        required: true
        type: choice
        options: [weekly, release]
        default: release
      waiver_reason:
        description: Optional audited release waiver reason (requires protected-environment approval)
        required: false
        type: string
      waiver_suites:
        description: Comma-separated suite IDs covered by the waiver
        required: false
        type: string
      waiver_tag:
        description: One release tag covered by the waiver
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: capability-eval-${{ github.event_name == 'schedule' && 'weekly' || inputs.target_ref }}-${{ github.event_name == 'schedule' && 'weekly' || inputs.tier }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare deterministic eval plan
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      sha: ${{ steps.meta.outputs.sha }}
      tier: ${{ steps.meta.outputs.tier }}
      retention: ${{ steps.meta.outputs.retention }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'schedule' && 'main' || inputs.target_ref }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Resolve immutable run metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          sha=$(git rev-parse HEAD)
          tier="${{ github.event_name == 'schedule' && 'weekly' || inputs.tier }}"
          retention=30
          if [ "$tier" = release ]; then retention=90; fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "tier=$tier" >> "$GITHUB_OUTPUT"
          echo "retention=$retention" >> "$GITHUB_OUTPUT"

      - name: Build standalone eval runner
        run: cargo build -p ha-eval --locked

      - name: Validate eval schemas, policies, manifests, and assets
        run: target/debug/hope-agent-eval validate

      - name: Create immutable plan and matrix
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/eval-plan"
          matrix=$(target/debug/hope-agent-eval plan \
            --tier "${{ steps.meta.outputs.tier }}" \
            --ref "${{ steps.meta.outputs.sha }}" \
            --output "$RUNNER_TEMP/eval-plan/plan.json" \
            --format github)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: eval-plan-${{ steps.meta.outputs.sha }}
          path: ${{ runner.temp }}/eval-plan/plan.json
          retention-days: ${{ fromJSON(steps.meta.outputs.retention) }}

  run:
    name: ${{ matrix.suite }} (${{ matrix.shard }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - uses: actions/download-artifact@v4
        with:
          name: eval-plan-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/eval-plan

      - name: Build standalone eval runner (debug suites)
        if: matrix.profile == 'debug'
        run: cargo build -p ha-eval --locked

      - name: Build standalone eval runner (scale suite)
        if: matrix.profile == 'release'
        run: cargo build -p ha-eval --release --locked

      - name: Run isolated deterministic cases
        shell: bash
        env:
          HA_EVAL_REQUIRE_NETWORK_ISOLATION: "1"
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/eval-result"
          # The runner verifies that only loopback exists before accepting this
          # flag. The namespace is the actual networkPolicy=deny boundary; the
          # environment variable alone is deliberately insufficient.
          sudo --preserve-env=HA_EVAL_REQUIRE_NETWORK_ISOLATION \
            unshare --net -- \
            "$GITHUB_WORKSPACE/target/${{ matrix.profile }}/hope-agent-eval" run \
            --plan "$RUNNER_TEMP/eval-plan/plan.json" \
            --suite "${{ matrix.suite }}" \
            --shard "${{ matrix.shard }}" \
            --output "$RUNNER_TEMP/eval-result/result.json"
          sudo chown "$(id -u):$(id -g)" "$RUNNER_TEMP/eval-result/result.json"

      - uses: actions/upload-artifact@v4
        with:
          name: eval-shard-${{ matrix.suite }}-${{ matrix.shardIndex }}
          path: ${{ runner.temp }}/eval-result/result.json
          retention-days: ${{ fromJSON(needs.prepare.outputs.retention) }}

  waiver:
    name: approve one-shot release eval waiver
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.waiver_reason != '' }}
    needs: prepare
    runs-on: ubuntu-latest
    environment: release-eval-waiver
    steps:
      - name: Validate and record approved waiver
        shell: bash
        env:
          WAIVER_REASON: ${{ inputs.waiver_reason }}
          WAIVER_SUITES: ${{ inputs.waiver_suites }}
          WAIVER_TAG: ${{ inputs.waiver_tag }}
        run: |
          set -euo pipefail
          if [ "${{ needs.prepare.outputs.tier }}" != release ]; then
            echo "Waivers are only valid for release-tier evals" >&2
            exit 1
          fi
          if [ -z "$WAIVER_TAG" ] || [ -z "$WAIVER_SUITES" ]; then
            echo "waiver_tag and waiver_suites are required with waiver_reason" >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/eval-waiver"
          suites=$(printf '%s' "$WAIVER_SUITES" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          jq -n \
            --arg commitSha "${{ needs.prepare.outputs.sha }}" \
            --arg tag "$WAIVER_TAG" \
            --arg reason "$WAIVER_REASON" \
            --arg approvedBy "${{ github.actor }}" \
            --arg approvedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg workflowRunId "${{ github.run_id }}" \
            --argjson suites "$suites" \
            '{schemaVersion:"eval-waiver.v1",commitSha:$commitSha,tag:$tag,reason:$reason,suites:$suites,approvedBy:$approvedBy,approvedAt:$approvedAt,workflowRunId:$workflowRunId}' \
            > "$RUNNER_TEMP/eval-waiver/waiver.json"

      - uses: actions/upload-artifact@v4
        with:
          name: eval-waiver-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/eval-waiver/waiver.json
          retention-days: 90

  aggregate:
    name: aggregate and verify evidence
    needs: [prepare, run, waiver]
    if: ${{ always() && needs.prepare.result == 'success' && needs.run.result == 'success' && (needs.waiver.result == 'success' || needs.waiver.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - uses: actions/download-artifact@v4
        with:
          name: eval-plan-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/eval-plan

      - uses: actions/download-artifact@v4
        with:
          pattern: eval-shard-*
          path: ${{ runner.temp }}/eval-shards

      - name: Download approved waiver when present
        if: ${{ needs.waiver.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: eval-waiver-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/eval-waiver

      - name: Build standalone eval runner
        run: cargo build -p ha-eval --locked

      - name: Aggregate evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/eval-evidence"
          waiver_args=()
          if [ -f "$RUNNER_TEMP/eval-waiver/waiver.json" ]; then
            waiver_args=(--waiver "$RUNNER_TEMP/eval-waiver/waiver.json")
          fi
          target/debug/hope-agent-eval aggregate \
            --plan "$RUNNER_TEMP/eval-plan/plan.json" \
            --inputs "$RUNNER_TEMP/eval-shards" \
            --output "$RUNNER_TEMP/eval-evidence/eval-evidence.v1.json" \
            --summary "$RUNNER_TEMP/eval-evidence/eval-summary.md" \
            "${waiver_args[@]}"

      - name: Verify evidence against current policy
        shell: bash
        env:
          WAIVER_TAG: ${{ inputs.waiver_tag }}
        run: |
          set -euo pipefail
          tag_args=()
          if [ -n "$WAIVER_TAG" ]; then tag_args=(--tag "$WAIVER_TAG"); fi
          target/debug/hope-agent-eval verify-evidence \
            --evidence "$RUNNER_TEMP/eval-evidence/eval-evidence.v1.json" \
            --ref "${{ needs.prepare.outputs.sha }}" \
            --tier "${{ needs.prepare.outputs.tier }}" \
            "${tag_args[@]}"

      - name: Add eval result to workflow summary
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/eval-evidence/eval-summary.md" ]; then
            cat "$RUNNER_TEMP/eval-evidence/eval-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ needs.prepare.outputs.tier }}-eval-evidence-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/eval-evidence/
          retention-days: ${{ fromJSON(needs.prepare.outputs.retention) }}
