name: Rust

on:
  pull_request:
    branches: [main, "release/**"]
  push:
    branches: [main, "release/**"]

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2

      # Vendored OpenSSL needs NASM to build on Windows MSVC. Chocolatey
      # is pre-installed on windows-latest runners; this avoids the
      # Node-20 deprecation on ilammy/setup-nasm (upstream has not
      # migrated — see ilammy/setup-nasm#45).
      #
      # community.chocolatey.org occasionally returns HTTP 499 on the V2
      # feed, so retry with backoff and fall back to the official NASM
      # Windows archive before giving up.
      - name: Install NASM (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./.github/scripts/install-nasm-windows.ps1

      # xcap pulls in wayland-sys (via libwayshot-xcap) and libspa-sys
      # (via its pipewire screen-capture path) on Linux. Ubuntu runners
      # don't ship any of these -dev packages by default.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            libgbm-dev \
            libdrm-dev \
            libpipewire-0.3-dev \
            libegl-dev \
            libx11-dev \
            libxrandr-dev

      # Matches the local invariant the workspace maintains: all clippy
      # warnings are handled (either fixed at the source or allowed in
      # `Cargo.toml`'s `[workspace.lints.clippy]` with a rationale).
      - name: Clippy (deny warnings)
        run: cargo clippy -p ha-core -p ha-server --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2

      - name: Install NASM (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./.github/scripts/install-nasm-windows.ps1

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            libgbm-dev \
            libdrm-dev \
            libpipewire-0.3-dev \
            libegl-dev \
            libx11-dev \
            libxrandr-dev

      # Only ha-core and ha-server are pure Rust and host tests. The Tauri
      # shell crate (open-computer) pulls glib/webkit system libs that are
      # expensive to install on Linux runners and carries no tests.
      - name: Build tests
        run: cargo test -p ha-core -p ha-server --no-run --locked

      - name: Run tests
        run: cargo test -p ha-core -p ha-server --no-fail-fast
