name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build (for example v0.1.1)
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.platform }})
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 — Apple silicon DMG. Universal / x64 builds are
          # intentionally skipped for now (Rosetta 2 handles x64 execution
          # of the arm64 bundle on Intel Macs acceptably for an agent
          # process, and a second macOS lane roughly doubles release
          # wall time).
          - platform: macos-arm64
            os: macos-14
            args: "--target aarch64-apple-darwin"
          # Linux x64 — AppImage + deb.
          # ubuntu-24.04 is required because xcap (screen capture) pulls
          # libspa-sys v0.9, which expects pipewire ≥ 1.0 headers. The
          # libpipewire-0.3-dev shipped with ubuntu-22.04 is 0.3.48 and
          # fails to compile (struct spa_video_info_raw missing `flags`).
          - platform: linux-x64
            os: ubuntu-24.04
            args: ""
          # Windows x64 — MSI (wix) + NSIS. Code signing certificate is
          # not wired up yet; bundles are unsigned. See
          # src-tauri/tauri.conf.json `bundle.windows.certificateThumbprint`
          # for where to plug it in.
          - platform: windows-x64
            os: windows-latest
            args: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-arm64' && 'aarch64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Windows MSVC + vendored OpenSSL needs NASM. Use Chocolatey
      # instead of ilammy/setup-nasm (upstream still on Node 20, see
      # ilammy/setup-nasm#45).
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm -y --no-progress
          "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Tauri on Linux pulls WebKit2GTK + a handful of gtk helpers.
      # xcap (screen capture) needs the full Wayland screenshot stack:
      # libpipewire-0.3-dev, libgbm-dev, libegl-dev, libwayland-dev
      # (otherwise `-lgbm` link-step fails).
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            libegl-dev \
            libwayland-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches app version
        run: pnpm release:verify -- --tag "${{ env.RELEASE_TAG }}"

      - name: Fetch VC++ Redistributable (Windows)
        if: runner.os == 'Windows'
        run: pnpm fetch:vcredist

      - name: Verify VC++ Redistributable Authenticode signature (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature src-tauri\resources\vc_redist.x64.exe
          if ($sig.Status -ne 'Valid') {
            throw "vc_redist.x64.exe Authenticode status is not Valid: $($sig.Status) — $($sig.StatusMessage)"
          }
          $subject = $sig.SignerCertificate.Subject
          if ($subject -notmatch 'CN=Microsoft Corporation') {
            throw "vc_redist.x64.exe signer is not Microsoft: $subject"
          }
          Write-Host "vc_redist.x64.exe Authenticode signature OK ($subject)"

      - name: Build & draft release
        uses: tauri-apps/tauri-action@v0.5.14
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Hope Agent ${{ env.RELEASE_TAG }}"
          releaseBody: |
            See CHANGELOG.md for details.

            Binaries are attached to this draft release. Review them
            before publishing.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
