name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build (for example v0.1.1)
        required: true
        type: string
      dry_run:
        description: "Validate release.yml changes — build the matrix and skip every publish step (no draft Release, no asset upload, no latest.json patch). Use when modifying this workflow."
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  eval-preflight:
    name: verify release eval evidence
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      found: ${{ steps.lookup.outputs.found }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.dry_run == 'true' && github.sha || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref) }}

      - name: Resolve exact release commit
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          sha=$(git rev-parse HEAD)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Find exact-SHA release eval evidence
        id: lookup
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release-eval"
          policy_mode=$(jq -r '.mode' evals/policy/release.json)
          if [ "${{ github.event.inputs.dry_run }}" = true ]; then
            cat > "$RUNNER_TEMP/release-eval/eval-summary.md" <<'EOF'
          # Capability Eval Evidence

          Release dry-run: deterministic eval evidence is advisory and was not queried.
          EOF
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          artifact="release-eval-evidence-${{ steps.meta.outputs.sha }}"
          run_id=""
          while IFS= read -r candidate_run_id; do
            [ -n "$candidate_run_id" ] || continue
            candidate_dir=$(mktemp -d "$RUNNER_TEMP/release-eval-candidate.XXXXXX")
            if gh run download "$candidate_run_id" --name "$artifact" --dir "$candidate_dir" 2>/dev/null; then
              cp "$candidate_dir/eval-evidence.v1.json" "$RUNNER_TEMP/release-eval/"
              cp "$candidate_dir/eval-summary.md" "$RUNNER_TEMP/release-eval/"
              run_id="$candidate_run_id"
              break
            fi
          done < <(gh run list \
            --workflow capability-eval.yml \
            --commit "${{ steps.meta.outputs.sha }}" \
            --event workflow_dispatch \
            --status completed \
            --limit 30 \
            --json databaseId,conclusion,createdAt \
            --jq '.[] | select(.conclusion == "success") | .databaseId')
          if [ -z "$run_id" ]; then
            cat > "$RUNNER_TEMP/release-eval/eval-summary.md" <<EOF
          # Capability Eval Evidence

          **Missing:** no successful release-tier capability eval evidence was found for exact commit \`${{ steps.meta.outputs.sha }}\`.

          Current policy mode: \`$policy_mode\`.
          EOF
            echo "found=false" >> "$GITHUB_OUTPUT"
            if [ "$policy_mode" = enforce ]; then exit 1; fi
            exit 0
          fi

          test -f "$RUNNER_TEMP/release-eval/eval-evidence.v1.json"
          test -f "$RUNNER_TEMP/release-eval/eval-summary.md"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: steps.lookup.outputs.found == 'true'
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        if: steps.lookup.outputs.found == 'true'
        with:
          cache-bin: false

      - name: Verify evidence digests and release policy
        if: steps.lookup.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p ha-eval --locked -- verify-evidence \
            --evidence "$RUNNER_TEMP/release-eval/eval-evidence.v1.json" \
            --ref "${{ steps.meta.outputs.sha }}" \
            --tier release \
            --tag "$RELEASE_TAG"

      - name: Add eval result to workflow summary
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/release-eval/eval-summary.md" ]; then
            cat "$RUNNER_TEMP/release-eval/eval-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/upload-artifact@v6.0.0
        if: always()
        with:
          name: release-eval-preflight
          path: ${{ runner.temp }}/release-eval/
          retention-days: 90

  model-eval-preflight:
    name: verify live-model campaign evidence
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    outputs:
      found: ${{ steps.lookup.outputs.found }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.dry_run == 'true' && github.sha || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref) }}

      - name: Resolve exact release commit
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Find exact-SHA live-model evidence
        id: lookup
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release-model-eval"
          policy_mode=$(jq -r '.mode' evals/live/policy/release.json)
          if [ "${{ github.event.inputs.dry_run }}" = true ]; then
            printf '%s\n' '# Live Model Campaign' '' 'Release dry-run: live-model evidence was not queried.' > "$RUNNER_TEMP/release-model-eval/model-summary.md"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          artifact="release-model-evidence-${{ steps.meta.outputs.sha }}"
          run_id=""
          while IFS= read -r candidate_run_id; do
            [ -n "$candidate_run_id" ] || continue
            candidate_dir=$(mktemp -d "$RUNNER_TEMP/release-model-candidate.XXXXXX")
            if gh run download "$candidate_run_id" --name "$artifact" --dir "$candidate_dir" 2>/dev/null; then
              cp "$candidate_dir/eval-model-campaign.v1.json" "$RUNNER_TEMP/release-model-eval/"
              cp "$candidate_dir/model-summary.md" "$RUNNER_TEMP/release-model-eval/"
              run_id="$candidate_run_id"
              break
            fi
          done < <(gh run list \
            --workflow model-campaign.yml \
            --commit "${{ steps.meta.outputs.sha }}" \
            --event workflow_dispatch \
            --status completed \
            --limit 30 \
            --json databaseId,conclusion \
            --jq '.[] | select(.conclusion == "success") | .databaseId')

          if [ -z "$run_id" ]; then
            cat > "$RUNNER_TEMP/release-model-eval/model-summary.md" <<EOF
          # Live Model Campaign

          **Missing:** no verified release-tier live-model evidence was found for exact commit `${{ steps.meta.outputs.sha }}`.

          Current model policy mode: `$policy_mode`.
          EOF
            echo "found=false" >> "$GITHUB_OUTPUT"
            if [ "$policy_mode" = enforce ]; then exit 1; fi
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: steps.lookup.outputs.found == 'true'
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        if: steps.lookup.outputs.found == 'true'
        with:
          cache-bin: false

      - name: Verify model evidence digests and release policy
        if: steps.lookup.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p ha-eval --locked -- model verify-evidence \
            --evidence "$RUNNER_TEMP/release-model-eval/eval-model-campaign.v1.json" \
            --ref "${{ steps.meta.outputs.sha }}" \
            --tier release \
            --tag "$RELEASE_TAG"

      - name: Add live-model result to workflow summary
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/release-model-eval/model-summary.md" ]; then
            cat "$RUNNER_TEMP/release-model-eval/model-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/upload-artifact@v6.0.0
        if: always()
        with:
          name: release-model-eval-preflight
          path: ${{ runner.temp }}/release-model-eval/
          retention-days: 90

  build:
    name: build (${{ matrix.platform }})
    needs: [eval-preflight, model-eval-preflight]
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      # 仅 release-tag / dispatch 构建串行化 codegen，换取最小 / 最快二进制（叠加
      # 根 Cargo.toml 的 lto="thin" / strip）。Docker（docker.yml 走 Dockerfile，
      # 不读此 env）与日常 dev 不受影响。
      #
      # 按 lane 可覆盖：v0.20.0 发版时 linux-arm64 在 tauri-action 步骤跑到 67 /
      # 74 分钟被 runner 杀掉两次（GitHub 注解 "lost communication … starves it
      # for CPU/Memory"）。codegen-units=1 把整个 ha-core（v0.20.0 已 509k 行）
      # 压成单个 LLVM 单元，峰值超出该 runner 的 15Gi + 3Gi swap，故 arm64 退回
      # cargo 默认 16，代价是该平台二进制略大、运行略慢。其余 lane 维持 1 不变。
      #
      # 磁盘已排除：上面 Report runner resources 实测 145G 盘 / 118G 可用。
      # macos-arm64 只有 7GB 内存却能扛住 codegen-units=1，推测是靠 macOS 的内存
      # 压缩与磁盘 swap；别据此以为 arm64 Linux 也该扛得住。
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: ${{ matrix.codegen_units || '1' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 — Apple silicon DMG, native build on M-series runner.
          - platform: macos-arm64
            os: macos-14
            rust_target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            # 这条 lane 是整个 release 的关键路径：v0.20.1 实测 147 分钟，其余
            # lane 66 / 67 / 100，总时长完全由它决定。macos-14 只有 3 核，
            # codegen-units=1 又恰好掐掉唯一能吃满多核的阶段。取 4 而非 arm64
            # Linux 的 16：3 核上 4 块已够并行，优化损失（跨块内联失效）远小于
            # 16，lto="thin" 还能补回一部分。与 linux-arm64 不同，这里不是 OOM
            # 规避而是纯提速——该 lane 未出现过 runner 杀进程。
            codegen_units: "4"
          # macOS x64 lane remains disabled (since v0.2.0). GitHub-hosted
          # macos-13 Intel runners are capacity-constrained and frequently
          # queue >1h. An earlier v0.2.1 attempt to re-add this lane with
          # `continue-on-error: true` did not help — Actions `needs:` waits
          # for queued/running jobs regardless of `continue-on-error`, so
          # patch-manifest still blocked on macos-x64. Long-term recovery
          # needs either cross-compile on macos-14 or a self-hosted Intel
          # runner. Intel Mac users continue to run the arm64 bundle through
          # Rosetta 2 (same as v0.1.x).
          # Linux x64 — AppImage + deb.
          # ubuntu-24.04 is required because xcap (screen capture) pulls
          # libspa-sys v0.9, which expects pipewire ≥ 1.0 headers. The
          # libpipewire-0.3-dev shipped with ubuntu-22.04 is 0.3.48 and
          # fails to compile (struct spa_video_info_raw missing `flags`).
          - platform: linux-x64
            os: ubuntu-24.04
            rust_target: ""
            args: ""
          # Linux arm64 — AppImage + deb + rpm.
          # Native GitHub-hosted ARM runner (free for public repos); same
          # apt deps as linux-x64, just installed in the arm64 chroot the
          # runner natively provides. Targets Raspberry Pi 4/5, Apple
          # Silicon running Asahi Linux, Graviton / Ampere cloud VMs.
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            rust_target: ""
            args: ""
            # 见 job env 的 CARGO_PROFILE_RELEASE_CODEGEN_UNITS 注释。
            codegen_units: "16"
          # Windows x64 — MSI (wix) + NSIS. Code signing certificate is
          # not wired up yet; bundles are unsigned. See
          # src-tauri/tauri.conf.json `bundle.windows.certificateThumbprint`
          # for where to plug it in.
          - platform: windows-x64
            os: windows-latest
            rust_target: ""
            args: ""
            # 同 macos-arm64：纯提速，非 OOM 规避。macOS 降到 ~90 分钟后这条
            # lane（v0.20.1 实测 100 分钟）会接替成为关键路径。4 核比 macOS 多
            # 一核，仍取 4 保持两条 lane 的优化档位一致。
            codegen_units: "4"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v5

      # 起始资源快照。arm64 lane 曾被 runner 杀掉两次且日志全丢，当时无从判断是
      # 磁盘还是内存——这一步就是为回答那个问题加的，并已给出答案：ubuntu-24.04-arm
      # 有 145G 盘 / 118G 可用、15Gi 内存 + 3Gi swap，磁盘绰绰有余，瓶颈在内存。
      # 保留它，下次资源类失败仍可一眼定位（注意：job 中途被杀时日志多半丢失，
      # 这份快照只在 job 跑完后可读）。
      - name: Report runner resources
        shell: bash
        run: |
          echo "--- disk ---"; df -h || true
          echo "--- memory ---"; (free -h || vm_stat || true)
          echo "--- cpus ---"; (nproc || sysctl -n hw.ncpu || true)

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # `ring` (via jsonwebtoken / rustls) assembles its Windows MSVC crypto
      # with NASM. Use Chocolatey instead of ilammy/setup-nasm (upstream still
      # on Node 20, see ilammy/setup-nasm#45).
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm -y --no-progress
          "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Tauri on Linux pulls WebKit2GTK + a handful of gtk helpers.
      # xcap (screen capture) needs the full Wayland screenshot stack:
      # libpipewire-0.3-dev, libgbm-dev, libegl-dev, libwayland-dev
      # (otherwise `-lgbm` link-step fails).
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            libegl-dev \
            libwayland-dev \
            patchelf \
            mold
          # mold 加速 Linux 桌面 bundle 链接（仅本 Linux leg 生效）。WebKit2GTK
          # 链接量大，已由 release dry-run 验证；若与某 -sys crate 链接脚本冲突，
          # 删此 echo 行即恢复默认 ld。
          echo 'RUSTFLAGS=-C link-arg=-fuse-ld=mold' >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches app version
        # Dry-runs may use a fake tag input (e.g. v9.9.9) that intentionally
        # does not match the source-tree version — skip this gate so an
        # in-progress version bump can still run the validation matrix.
        if: github.event.inputs.dry_run != 'true'
        run: pnpm release:verify -- --tag "${{ env.RELEASE_TAG }}"

      # Refuse to ship if the desktop bundle (`tauri-plugin-updater`) and
      # the headless self-update (`ha_core::updater`) point at different
      # Minisign pubkeys — one of the two would silently break.
      - name: Verify updater pubkey sync (tauri.conf.json ↔ ha-core)
        run: node scripts/verify-updater-pubkey.mjs

      # Extract per-version release notes for both the GitHub Release body
      # and the Tauri updater `latest.json#notes` field (tauri-action copies
      # `releaseBody` into the updater manifest). Falls back to a generic
      # blurb when the notes file is missing so a release never blocks on
      # documentation. `shell: bash` is forced so the same heredoc works on
      # the Windows runner (git-bash is available on windows-latest).
      - name: Extract release notes
        id: notes
        shell: bash
        run: |
          notes_file="docs/release-notes/${RELEASE_TAG}.md"
          if [ -f "$notes_file" ]; then
            body=$(cat "$notes_file")
          else
            body="See CHANGELOG.md for details."
          fi
          {
            echo "body<<HA_NOTES_EOF"
            echo "$body"
            echo ""
            echo "Binaries are attached to this draft release. Review them before publishing."
            echo "HA_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Fetch VC++ Redistributable (Windows)
        if: runner.os == 'Windows'
        run: pnpm fetch:vcredist

      - name: Verify VC++ Redistributable Authenticode signature (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature src-tauri\resources\vc_redist.x64.exe
          if ($sig.Status -ne 'Valid') {
            throw "vc_redist.x64.exe Authenticode status is not Valid: $($sig.Status) — $($sig.StatusMessage)"
          }
          $subject = $sig.SignerCertificate.Subject
          if ($subject -notmatch 'CN=Microsoft Corporation') {
            throw "vc_redist.x64.exe signer is not Microsoft: $subject"
          }
          Write-Host "vc_redist.x64.exe Authenticode signature OK ($subject)"

      # Sign the macOS build with a fixed self-signed certificate so granted
      # TCC permissions (Screen Recording, Accessibility, ...) survive
      # auto-updates instead of resetting on every ad-hoc cdhash change. A
      # self-signed cert is NOT trusted by default, so codesign refuses it with
      # "no identity found" — we must build our own keychain and add the cert as
      # a trusted code-signing root (admin domain ⇒ sudo, available on the
      # runner). Tauri then signs via APPLE_SIGNING_IDENTITY against this
      # keychain. No-op when APPLE_CERTIFICATE is unset (build stays ad-hoc).
      # See docs/macos-self-signing.md.
      - name: Set up macOS code signing (self-signed)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "APPLE_CERTIFICATE not set — macOS build stays ad-hoc signed."
            exit 0
          fi
          cert="$RUNNER_TEMP/ha-cert.p12"
          pem="$RUNNER_TEMP/ha-cert.pem"
          kc="$RUNNER_TEMP/ha-signing.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$cert"
          # Certificate-only PEM (no private key) for the trust step.
          openssl pkcs12 -in "$cert" -clcerts -nokeys \
            -passin "pass:${APPLE_CERTIFICATE_PASSWORD}" -out "$pem"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$kc"
          security set-keychain-settings -lut 21600 "$kc"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$kc"
          security import "$cert" -k "$kc" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$kc" >/dev/null
          # Trust the self-signed cert as a code-signing root so codesign treats
          # the identity as valid.
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain "$pem"
          # Put our keychain on the search list so codesign / Tauri find it.
          security list-keychains -d user -s "$kc" \
            $(security list-keychains -d user | sed 's/"//g')
          rm -f "$cert" "$pem"
          security find-identity -v -p codesigning "$kc"

      - name: Build & draft release
        if: github.event.inputs.dry_run != 'true'
        uses: tauri-apps/tauri-action@v0.5.14
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Sign macOS with the self-signed identity prepared by the "Set up
          # macOS code signing" step (it builds the keychain + trusts the cert;
          # Tauri's own APPLE_CERTIFICATE import does NOT trust a self-signed
          # cert, so codesign would fail "no identity found"). Empty when the
          # secret is unset → Tauri falls back to ad-hoc (no behavior change).
          # No APPLE_ID/APPLE_TEAM_ID ⇒ sign-only, no notarization. See
          # docs/macos-self-signing.md.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Hope Agent ${{ env.RELEASE_TAG }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # Dry-run replacement for tauri-action above: build the desktop
      # bundle locally without creating a draft Release or uploading
      # assets. Produces the same target/<triple>/release/hope-agent[.exe]
      # path so the bare-binary step below can validate it. Same
      # secrets passed through so signer-sign mismatches surface here
      # too. (`pnpm tauri build` is what tauri-action invokes internally.)
      - name: Dry-run build (skip publish)
        if: github.event.inputs.dry_run == 'true'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Same self-signed identity as the real build (prepared by the "Set up
          # macOS code signing" step) so signing problems surface in dry-run.
          # Empty ⇒ ad-hoc (unchanged). See docs/macos-self-signing.md.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          pnpm tauri build ${{ matrix.args }}

      # ── Bare-binary artifact for headless self-update ─────────
      # The desktop installers above cover GUI users; `hope-agent server`
      # / CLI deployments that can't run `tauri-plugin-updater` need a
      # signed tar.gz / zip with just the executable inside. Same
      # Minisign keypair as the desktop installer — `ha_core::updater`
      # verifies against the pubkey in `ha-core/updater/keys.rs` (which
      # `verify-updater-pubkey.mjs` already proved matches
      # tauri.conf.json above).
      - name: Bundle + sign bare binary
        id: bare_binary
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          case "${{ matrix.platform }}" in
            macos-arm64) target_dir=target/aarch64-apple-darwin/release; plat=darwin-aarch64; ext="";;
            macos-x64)   target_dir=target/x86_64-apple-darwin/release; plat=darwin-x86_64; ext="";;
            linux-x64)   target_dir=target/release; plat=linux-x86_64;  ext="";;
            linux-arm64) target_dir=target/release; plat=linux-aarch64; ext="";;
            windows-x64) target_dir=target/release; plat=windows-x86_64; ext=".exe";;
            *) echo "unknown matrix platform ${{ matrix.platform }}"; exit 1;;
          esac
          bin_path="$target_dir/hope-agent$ext"
          if [ ! -f "$bin_path" ]; then
            echo "Bare binary not found at $bin_path"; ls "$target_dir" || true; exit 1
          fi
          # The native-messaging browser host rides along in the same archive
          # so extension-backend installs work on bare-binary deployments;
          # `self_contained::install` swaps it next to the main binary on
          # upgrade (manifest `extra_binaries`). Take it from the Tauri
          # resources staging dir — `prepare:browser-host` (beforeBuildCommand)
          # always copies it there, whereas its cargo output dir depends on
          # TAURI_ENV_TARGET_TRIPLE (set by tauri even on lanes that pass no
          # --target), which does NOT match this step's $target_dir on the
          # linux/windows lanes.
          host_path="src-tauri/resources/browser-host/ha-browser-host$ext"
          if [ ! -f "$host_path" ]; then
            echo "Browser host not found at $host_path"; ls src-tauri/resources/browser-host || true; exit 1
          fi
          cp "$host_path" "$target_dir/ha-browser-host$ext"
          version="${RELEASE_TAG#v}"
          out_dir="bare-binary-bundle"
          mkdir -p "$out_dir"
          if [ "${{ runner.os }}" = "Windows" ]; then
            archive="$out_dir/hope-agent-${version}-${plat}.zip"
            powershell -Command "Compress-Archive -Path '$bin_path','$target_dir/ha-browser-host$ext' -DestinationPath '$archive' -Force"
          else
            archive="$out_dir/hope-agent-${version}-${plat}.tar.gz"
            tar -C "$target_dir" -czf "$archive" "hope-agent$ext" "ha-browser-host$ext"
          fi
          # `tauri signer sign` writes <archive>.sig next to the archive.
          # Both env vars above are mandatory for non-interactive signing —
          # the private key + password are passed through args, no
          # interactive prompt fires.
          pnpm tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$archive"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "sig=$archive.sig" >> "$GITHUB_OUTPUT"

      - name: Upload bare binary to release
        if: github.event.inputs.dry_run != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ env.RELEASE_TAG }}" "${{ steps.bare_binary.outputs.archive }}" "${{ steps.bare_binary.outputs.sig }}" --clobber

      - name: Upload bare binary as workflow artifact (for manifest patch)
        uses: actions/upload-artifact@v6.0.0
        with:
          name: bare-binary-${{ matrix.platform }}
          path: |
            ${{ steps.bare_binary.outputs.archive }}
            ${{ steps.bare_binary.outputs.sig }}

  attach-eval-evidence:
    name: attach eval evidence to draft release
    needs: [eval-preflight, model-eval-preflight, build]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/download-artifact@v7.0.0
        with:
          name: release-eval-preflight
          path: eval-preflight

      - uses: actions/download-artifact@v7.0.0
        with:
          name: release-model-eval-preflight
          path: model-eval-preflight

      - name: Upload evidence files and append release summary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          upload=(eval-preflight/eval-summary.md)
          if [ -f eval-preflight/eval-evidence.v1.json ]; then
            upload+=(eval-preflight/eval-evidence.v1.json)
          fi
          upload+=(model-eval-preflight/model-summary.md)
          if [ -f model-eval-preflight/eval-model-campaign.v1.json ]; then
            upload+=(model-eval-preflight/eval-model-campaign.v1.json)
          fi
          gh release upload "$RELEASE_TAG" "${upload[@]}" --clobber

          gh release view "$RELEASE_TAG" --json body --jq '.body // ""' > release-body.md
          python3 - <<'PY'
          from pathlib import Path

          body_path = Path("release-body.md")
          body = body_path.read_text()

          def upsert(summary_path: str, marker: str, body: str) -> str:
              summary = Path(summary_path).read_text().rstrip()
              start = f"<!-- {marker} -->"
              end = f"<!-- /{marker} -->"
              block = f"{start}\n{summary}\n{end}"
              start_index = body.find(start)
              end_index = body.find(end)
              if (start_index < 0) != (end_index < 0) or (
                  start_index >= 0 and end_index < start_index
              ):
                  raise SystemExit(f"malformed {marker} block")
              if start_index >= 0:
                  end_index += len(end)
                  return body[:start_index] + block + body[end_index:]
              return body.rstrip() + "\n\n" + block + "\n"

          body = upsert(
              "eval-preflight/eval-summary.md", "hope-agent-release-eval", body
          )
          body = upsert(
              "model-eval-preflight/model-summary.md",
              "hope-agent-release-model-eval",
              body,
          )
          body_path.write_text(body)
          PY
          gh release edit "$RELEASE_TAG" --notes-file release-body.md

  # Patch `latest.json` with bare_binary entries once every platform has
  # uploaded its archive + sig. tauri-action wrote `latest.json` with only
  # the desktop `platforms` map — `ha_core::updater::self_contained`
  # additionally reads `bare_binary.platforms.<key>` so headless installs
  # can self-update.
  patch-manifest:
    name: patch latest.json
    needs: build
    # Default `needs:` gating already requires every build matrix entry
    # to succeed — that's exactly what we want. If any platform fails
    # we *do not* want to write out a half-populated latest.json (then
    # the operator can `Re-run failed jobs` and the original
    # patch-manifest job stays unchanged). Only carve-out: skip in
    # dry-run since no draft Release exists to patch.
    if: ${{ github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/download-artifact@v7.0.0
        with:
          path: artifacts
          pattern: bare-binary-*
      - name: Download current latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p manifest
          gh release download "${RELEASE_TAG}" --pattern "latest.json" --dir manifest
      - name: Patch latest.json with bare_binary entries
        # --require 必须与上面 build job 的 matrix 平台列表一致：少写一个，那个
        # 平台的产物丢失又会变成静默的残缺清单；多写一个（如已禁用的 macos-x64）
        # 则每次发版都失败。改 matrix 时同步改这里。
        run: |
          node scripts/patch-latest-json.mjs manifest/latest.json artifacts "${RELEASE_TAG}" \
            --require=macos-arm64,linux-x64,linux-arm64,windows-x64
      - name: Re-upload patched latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${RELEASE_TAG}" manifest/latest.json --clobber
