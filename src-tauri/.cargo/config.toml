# Statically link the MSVC C/C++ runtime so hope-agent.exe doesn't require
# VCRUNTIME140 / MSVCP140 to be present on the user's machine. The NSIS
# installer still bundles vc_redist.x64.exe (see windows/installer-hooks.nsh)
# as a fallback for any native lib that pulls a dynamic C++ runtime anyway.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

# aarch64-windows: pyke's prebuilt onnxruntime (via fastembed → ort-sys) is
# built against the DYNAMIC CRT (/MD). Forcing +crt-static here makes the 42
# UCRT math/stdio imports (__imp_acoshf, __imp_strftime, …) unresolvable →
# LNK1120. There is no static-CRT prebuilt for this target, so link the dynamic
# CRT to match. (x86_64 keeps static CRT above — its onnxruntime prebuilt matches.)
[target.aarch64-pc-windows-msvc]
# intentionally no crt-static
