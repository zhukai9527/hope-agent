# Statically link the MSVC C/C++ runtime so hope-agent.exe doesn't require
# VCRUNTIME140 / MSVCP140 to be present on the user's machine. The NSIS
# installer still bundles vc_redist.x64.exe (see windows/installer-hooks.nsh)
# as a fallback for any native lib that pulls a dynamic C++ runtime anyway.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

# aarch64-windows: historically forced to the dynamic CRT because pyke's
# prebuilt onnxruntime (fastembed → ort-sys) was built against /MD and had no
# static-CRT variant for this target. That dependency is gone, so the original
# reason no longer applies — but whether the remaining native deps link cleanly
# under +crt-static has not been verified on a real aarch64-windows build.
# Left as-is deliberately; re-test before unifying with the x86_64 branch above.
[target.aarch64-pc-windows-msvc]
# intentionally no crt-static
